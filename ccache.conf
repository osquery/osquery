# Validate the compiler by its content rather than mtime. Important on hosted
# runners where the Xcode/toolchain install can change under the same runner label.
compiler_check = content

# Use dependency-file mode to skip the preprocessor on cache hits.
depend_mode = true

# On macOS/APFS, clone cached files instead of copying them.
file_clone = true

# Verify PCH checksums externally, required for correct REUSE_FROM PCH handling
# on macOS with the AWS SDK (see cmake/ccache.cmake).
pch_external_checksum = true

# Sloppiness:
#   include_file_ctime / include_file_mtime - ignore timestamp-only changes
#   locale                                  - ignore locale-environment differences
#   pch_defines                             - allow hits when a PCH was built with the same #defines
#   time_macros                             - ignore __TIME__ / __DATE__ (not used in osquery)
sloppiness = include_file_ctime, include_file_mtime, locale, pch_defines, time_macros
